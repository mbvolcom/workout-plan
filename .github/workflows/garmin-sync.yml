name: Garmin daily sync

on:
  schedule:
    # Runs at 06:00 UTC every day. Adjust as you like -- Garmin's own
    # daily summary usually finalises overnight, so early morning is a
    # safe time to pull yesterday's complete numbers.
    - cron: '0 6 * * *'
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab to test

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install GarminDB
        run: pip install garmindb

      - name: Configure GarminDB
        env:
          GARMIN_USERNAME: ${{ secrets.GARMIN_USERNAME }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: |
          mkdir -p ~/.GarminDb
          cat > ~/.GarminDb/GarminConnectConfig.json << EOF
          {
            "credentials": {
              "user": "${GARMIN_USERNAME}",
              "password": "${GARMIN_PASSWORD}",
              "secure_password": false
            },
            "data": {
              "weight_start_date": "01/01/2026",
              "sleep_start_date": "01/01/2026",
              "rhr_start_date": "01/01/2026",
              "monitoring_start_date": "01/01/2026",
              "download_latest_activities": 5,
              "download_all_activities": 1000
            },
            "directories": {
              "base_dir": "~/HealthData"
            },
            "enabled_stats": {
              "monitoring": true,
              "steps": true,
              "itime": false,
              "sleep": true,
              "rhr": true,
              "weight": true,
              "activities": false
            }
          }
          EOF

      - name: Download latest Garmin data
        run: |
          garmindb_cli.py --all --download --import --analyze --latest

      - name: Push today's metrics to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/push_to_supabase.py
