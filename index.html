<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Sterk Gutt</title>

<!-- PWA -->
<link rel="manifest" href="/manifest.json"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="SterkGutt"/>
<meta name="theme-color" content="#07080c"/>
<link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png"/>
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

:root {
  --bg: #07080c;
  --bg2: #0d0f17;
  --bg3: #12141f;
  --surface: #151824;
  --surface2: #1c1f30;
  --border: rgba(0,180,255,0.08);
  --border2: rgba(0,180,255,0.18);
  --text: #e8eaf0;
  --muted: #4a5068;
  --muted2: #6b7490;
  --neon: #00b4ff;
  --neon-dim: rgba(0,180,255,0.15);
  --neon-glow: rgba(0,180,255,0.4);
  --neon2: #00ffcc;
  --neon3: #7c6aff;
  --red: #ff4466;
  --red-dim: rgba(255,68,102,0.15);
  --green: #00ffcc;
  --green-dim: rgba(0,255,204,0.12);
  --orange: #ff9f43;
  --orange-dim: rgba(255,159,67,0.12);
  --nav-h: 64px;
  --header-h: 56px;
}

html,body{height:100%;overflow:hidden;}
body{
  font-family:'DM Mono',monospace;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
}

/* SCAN LINE EFFECT */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
  pointer-events:none;
  z-index:9999;
}

/* TOP HEADER */
.app-header{
  height:var(--header-h);
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  flex-shrink:0;
  position:relative;
}
.app-header::after{
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;
  height:1px;
  background:linear-gradient(90deg,transparent,var(--neon),transparent);
  opacity:0.4;
}
.logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:26px;
  letter-spacing:4px;
  color:#fff;
  line-height:1;
}
.logo span{color:var(--neon);text-shadow:0 0 12px var(--neon-glow);}
.header-right{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}

/* MAIN CONTENT */
.main{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  padding-bottom:calc(var(--nav-h) + 16px);
  -webkit-overflow-scrolling:touch;
}
.page{display:none;}
.page.active{display:block;}

/* BOTTOM NAV */
.bottom-nav{
  height:var(--nav-h);
  background:var(--bg2);
  border-top:1px solid var(--border);
  display:grid;
  grid-template-columns:repeat(4,1fr);
  flex-shrink:0;
  position:relative;
}
.bottom-nav::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:1px;
  background:linear-gradient(90deg,transparent,var(--neon),transparent);
  opacity:0.3;
}
.nav-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;border:none;background:none;cursor:pointer;
  color:var(--muted);font-family:'DM Mono',monospace;font-size:9px;
  letter-spacing:1.5px;text-transform:uppercase;
  transition:color 0.2s;padding:8px 0;
}
.nav-btn svg{width:20px;height:20px;stroke-width:1.5;transition:filter 0.2s;}
.nav-btn.active{color:var(--neon);}
.nav-btn.active svg{filter:drop-shadow(0 0 4px var(--neon-glow));}

/* SHARED COMPONENTS */
.section-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:13px;letter-spacing:3px;color:var(--muted2);
  text-transform:uppercase;margin-bottom:12px;
  display:flex;align-items:center;gap:10px;
}
.section-title::after{content:'';flex:1;height:1px;background:var(--border2);}

.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
}
.card-neon{border-color:var(--border2);box-shadow:0 0 20px rgba(0,180,255,0.05);}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  border:none;border-radius:8px;cursor:pointer;
  font-family:'DM Mono',monospace;font-weight:500;
  transition:all 0.15s;letter-spacing:1px;
  text-transform:uppercase;font-size:11px;
}
.btn-primary{
  background:var(--neon);color:#000;padding:14px 24px;
  font-size:12px;font-weight:500;letter-spacing:2px;
  box-shadow:0 0 20px var(--neon-glow);
  width:100%;
}
.btn-primary:hover{box-shadow:0 0 30px var(--neon-glow);}
.btn-primary:active{transform:scale(0.98);}
.btn-ghost{
  background:transparent;color:var(--neon);
  border:1px solid var(--border2);
  padding:10px 18px;font-size:10px;
}
.btn-ghost:active{background:var(--neon-dim);}
.btn-danger{
  background:transparent;color:var(--red);
  border:1px solid rgba(255,68,102,0.2);
  padding:8px 14px;font-size:10px;
}
.btn-sm{padding:7px 12px;font-size:10px;}
.btn-icon{
  width:32px;height:32px;border-radius:6px;padding:0;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--muted2);font-size:16px;
  display:inline-flex;align-items:center;justify-content:center;
}

input,textarea,select{
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:8px;
  color:var(--text);
  font-family:'DM Mono',monospace;
  font-size:13px;
  padding:10px 14px;
  width:100%;
  outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
  -webkit-appearance:none;
}
input:focus,textarea:focus,select:focus{
  border-color:var(--neon);
  box-shadow:0 0 0 2px var(--neon-dim);
}
input::placeholder,textarea::placeholder{color:var(--muted);}
select option{background:var(--surface2);}

label{font-size:10px;color:var(--muted2);letter-spacing:1.5px;text-transform:uppercase;display:block;margin-bottom:6px;}

/* ═══════════════════════════════════════
   HOME PAGE
═══════════════════════════════════════ */
#page-home{padding:20px 16px;}

.home-hero{
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:16px;
  padding:24px 20px;
  margin-bottom:24px;
  position:relative;
  overflow:hidden;
}
.home-hero::before{
  content:'';
  position:absolute;
  top:-40px;right:-40px;
  width:200px;height:200px;
  background:radial-gradient(circle,rgba(0,180,255,0.08) 0%,transparent 70%);
}
.home-hero-label{font-size:10px;letter-spacing:3px;color:var(--neon);text-transform:uppercase;margin-bottom:8px;}
.home-hero-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;color:#fff;line-height:1;margin-bottom:4px;}
.home-hero-sub{font-size:11px;color:var(--muted2);margin-bottom:20px;}

.recent-item{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  transition:background 0.15s;
}
.recent-item:last-child{border-bottom:none;}
.recent-item:active{background:var(--surface2);}
.recent-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--neon);
  box-shadow:0 0 6px var(--neon-glow);
  flex-shrink:0;
}
.recent-info{flex:1;min-width:0;}
.recent-name{font-size:13px;color:var(--text);font-weight:500;}
.recent-meta{font-size:10px;color:var(--muted2);margin-top:2px;}
.recent-right{font-size:11px;color:var(--muted);text-align:right;}
.recent-sets{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--neon);display:block;}

/* ═══════════════════════════════════════
   WORKOUT PICKER MODAL
═══════════════════════════════════════ */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(7,8,12,0.92);
  z-index:1000;
  display:none;
  flex-direction:column;
  padding:20px 16px;
  overflow-y:auto;
}
.modal-overlay.open{display:flex;}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;
}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:#fff;}
.modal-close{
  width:36px;height:36px;border-radius:8px;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--muted2);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}

.routine-pick-item{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:16px;
  margin-bottom:10px;
  cursor:pointer;
  transition:border-color 0.2s,background 0.2s;
  display:flex;align-items:center;gap:14px;
}
.routine-pick-item:active{background:var(--surface2);border-color:var(--border2);}
.routine-pick-icon{
  width:40px;height:40px;border-radius:8px;
  background:var(--neon-dim);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.routine-pick-icon svg{width:18px;height:18px;stroke:var(--neon);}
.routine-pick-name{font-size:14px;font-weight:500;color:var(--text);}
.routine-pick-meta{font-size:10px;color:var(--muted2);margin-top:3px;}

.new-routine-btn{
  background:transparent;
  border:1px dashed var(--border2);
  border-radius:12px;
  padding:16px;
  width:100%;
  display:flex;align-items:center;gap:14px;
  cursor:pointer;
  color:var(--neon);
  font-family:'DM Mono',monospace;
  font-size:13px;
  margin-top:4px;
  transition:background 0.15s;
}
.new-routine-btn:active{background:var(--neon-dim);}

/* ═══════════════════════════════════════
   ACTIVE WORKOUT PAGE
═══════════════════════════════════════ */
#page-workout{padding:0;}

.workout-header{
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:14px 16px;
  position:sticky;top:0;z-index:10;
}
.workout-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.workout-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:#fff;}
.workout-timer-badge{
  font-family:'Bebas Neue',sans-serif;font-size:20px;
  color:var(--neon);letter-spacing:2px;
  text-shadow:0 0 8px var(--neon-glow);
}
.workout-progress{display:flex;gap:8px;align-items:center;}
.workout-prog-text{font-size:10px;color:var(--muted2);}
.workout-finish-btn{
  background:var(--neon);color:#000;
  border:none;border-radius:6px;padding:8px 16px;
  font-family:'DM Mono',monospace;font-size:10px;font-weight:500;
  letter-spacing:2px;text-transform:uppercase;cursor:pointer;
  box-shadow:0 0 12px var(--neon-glow);
}

.workout-body{padding:12px 16px;}

/* Exercise card in workout */
.ex-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  margin-bottom:12px;
  overflow:hidden;
  transition:border-color 0.2s;
}
.ex-card.active-ex{border-color:var(--border2);box-shadow:0 0 16px rgba(0,180,255,0.06);}
.ex-card-header{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
}
.ex-drag-handle{
  color:var(--muted);font-size:14px;cursor:grab;
  touch-action:none;
  padding:2px 4px;
}
.ex-card-title{flex:1;min-width:0;}
.ex-card-name{font-size:13px;font-weight:500;color:var(--text);}
.ex-card-meta{font-size:10px;color:var(--muted2);margin-top:1px;}
.ex-duration{
  font-family:'Bebas Neue',sans-serif;font-size:14px;
  color:var(--neon3);letter-spacing:1px;
}
.ex-collapse-btn{color:var(--muted);font-size:12px;transition:transform 0.2s;}
.ex-card.collapsed .ex-collapse-btn{transform:rotate(-90deg);}

.ex-card-body{padding:10px 14px 14px;}
.ex-card.collapsed .ex-card-body{display:none;}

/* Set rows — simplified, no log button column */
.set-header-row{
  display:grid;
  font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);
  margin-bottom:6px;padding:0 4px;
}
.set-header-row.bilateral  { grid-template-columns:24px 1fr 1fr 1fr; }
.set-header-row.unilateral { grid-template-columns:24px 1fr 1fr 1fr 1fr; }

.set-row {
  border-radius:8px;
  margin-bottom:6px;
  overflow:hidden;
  border:1px solid var(--border);
  transition:border-color 0.2s;
}
.set-row.set-active  { border-color:var(--neon);  box-shadow:0 0 10px rgba(0,180,255,0.1); }
.set-row.set-logged  { border-color:rgba(0,255,204,0.25); }

.set-row-top {
  display:grid;
  gap:6px;align-items:center;
  padding:8px 8px 0;
}
.set-row-top.bilateral  { grid-template-columns:24px 1fr 1fr 1fr; }
.set-row-top.unilateral { grid-template-columns:24px 1fr 1fr 1fr 1fr; }

.set-num {
  font-family:'Bebas Neue',sans-serif;font-size:14px;
  color:var(--muted);text-align:center;
}
.set-input {
  background:var(--surface2);border:1px solid var(--border);
  border-radius:6px;padding:7px 4px;
  font-size:13px;text-align:center;
  color:var(--text);-webkit-appearance:none;
  font-family:'DM Mono',monospace;
}
.set-input:focus{border-color:var(--neon);box-shadow:0 0 0 1px var(--neon-dim);}
.set-input.logged{border-color:rgba(0,255,204,0.3);background:rgba(0,255,204,0.05);}
.set-input::placeholder{color:var(--muted);}
.set-input.ghost-only{color:rgba(0,180,255,0.3)!important;font-style:italic;}
.set-input:disabled{opacity:0.5;cursor:not-allowed;}

.set-note-row { padding:6px 8px 0; }
.set-note {
  background:var(--surface2);border:1px solid var(--border);
  border-radius:6px;padding:6px 8px;width:100%;
  font-size:11px;color:var(--muted2);
  font-family:'DM Mono',monospace;
  resize:none;height:30px;overflow:hidden;
}
.set-note:focus{border-color:var(--neon);box-shadow:0 0 0 1px var(--neon-dim);color:var(--text);}

/* START / STOP button row */
.set-btn-row {
  padding:8px;display:flex;gap:6px;align-items:center;
}
.set-start-btn {
  flex:1;border:none;border-radius:6px;
  padding:10px;cursor:pointer;
  font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;
  transition:all 0.15s;
}
.set-start-btn.state-idle {
  background:#0d2a3e;color:#00b4ff;border:1px solid rgba(0,180,255,0.35);
  box-shadow:0 0 10px rgba(0,180,255,0.15);
}
.set-start-btn.state-idle:active { background:#0a1f2e;color:#00cfff; }
.set-start-btn.state-active {
  background:var(--red);color:#fff;
  box-shadow:0 0 14px rgba(255,68,102,0.4);
  animation:pulse-red 1.5s infinite;
}
.set-start-btn.state-logged {
  background:var(--green-dim);color:var(--green);
  border:1px solid rgba(0,255,204,0.3);
  font-size:13px;letter-spacing:1px;
}

@keyframes pulse-red {
  0%,100%{box-shadow:0 0 14px rgba(255,68,102,0.4);}
  50%{box-shadow:0 0 22px rgba(255,68,102,0.7);}
}

/* REST TIMER — prominent banner between sets */
.rest-banner {
  margin:6px 0;
  border-radius:10px;
  background:linear-gradient(135deg,rgba(0,180,255,0.12),rgba(0,255,204,0.08));
  border:1px solid var(--border2);
  padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;
}
.rest-banner-label {
  font-size:10px;letter-spacing:3px;text-transform:uppercase;
  color:var(--muted2);margin-bottom:2px;
}
.rest-banner-time {
  font-family:'Bebas Neue',sans-serif;
  font-size:42px;letter-spacing:4px;
  color:var(--neon);
  text-shadow:0 0 20px var(--neon-glow);
  line-height:1;
}
.rest-banner-sub {
  font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:1px;
}

/* Set actions */
.ex-actions{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}

/* Save routine changes button */
.save-routine-btn {
  display:flex;align-items:center;gap:6px;
  margin-top:8px;width:100%;
  background:rgba(255,159,67,0.1);border:1px solid rgba(255,159,67,0.3);
  border-radius:8px;padding:10px 14px;
  color:var(--orange);font-family:'DM Mono',monospace;
  font-size:11px;letter-spacing:1px;cursor:pointer;
  transition:background 0.15s;
}
.save-routine-btn:active{background:rgba(255,159,67,0.2);}

/* ═══════════════════════════════════════
   ROUTINES PAGE
═══════════════════════════════════════ */
#page-routines{padding:20px 16px;}

.routine-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  margin-bottom:10px;
  overflow:hidden;
}
.routine-card-header{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;cursor:pointer;
}
.routine-card-name{font-size:14px;font-weight:500;color:var(--text);flex:1;}
.routine-card-meta{font-size:10px;color:var(--muted2);margin-top:2px;}
.routine-card-actions{display:flex;gap:8px;}
.routine-card-actions button{
  background:none;border:none;color:var(--muted2);
  cursor:pointer;font-size:16px;padding:4px;
  transition:color 0.15s;
}
.routine-card-actions button:hover{color:var(--neon);}

/* Routine editor */
.routine-editor{padding:0 16px 16px;}
.routine-ex-item{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:8px;
  padding:12px 14px;
  margin-bottom:8px;
  display:flex;align-items:center;gap:10px;
}
.routine-ex-info{flex:1;min-width:0;}
.routine-ex-name{font-size:13px;color:var(--text);}
.routine-ex-tags{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;}
.tag{
  font-size:9px;letter-spacing:1px;text-transform:uppercase;
  padding:2px 7px;border-radius:3px;
  background:var(--neon-dim);color:var(--neon);
  border:1px solid var(--border2);
}
.tag.unilateral{background:rgba(124,106,255,0.1);color:var(--neon3);border-color:rgba(124,106,255,0.2);}

/* ═══════════════════════════════════════
   STATS PAGE
═══════════════════════════════════════ */
#page-stats{padding:20px 16px;}

.stats-filter{display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;}
.filter-btn{
  flex-shrink:0;padding:7px 14px;border-radius:6px;
  background:var(--surface);border:1px solid var(--border);
  color:var(--muted2);font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:1px;cursor:pointer;
  transition:all 0.15s;white-space:nowrap;
}
.filter-btn.active{background:var(--neon-dim);border-color:var(--border2);color:var(--neon);}

.stat-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:16px;margin-bottom:12px;
}
.stat-card-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);margin-bottom:14px;}
.stat-value{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--neon);text-shadow:0 0 10px var(--neon-glow);}
.stat-label{font-size:10px;color:var(--muted2);}

.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}

/* Stats filter */
.stats-filter-bar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:4px;}
.stats-filter-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#e0ddd8;font-weight:600;margin-bottom:10px;}
.stats-preset-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.stats-preset-btn{padding:6px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;border:1px solid var(--border);background:var(--surface2);color:#c8c4be;transition:all 0.15s;}
.stats-preset-btn.active{background:rgba(0,180,255,0.15);border-color:var(--neon);color:var(--neon);}
.stats-filter-row{display:flex;align-items:center;gap:8px;margin-top:6px;}
.stats-date-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:12px;color:#e0ddd8;font-family:inherit;outline:none;}
.stats-date-input:focus{border-color:var(--neon);}
.stats-filter-sep{color:#6b7280;font-size:14px;flex-shrink:0;}
.stats-apply-btn-sm{background:rgba(0,180,255,0.12);color:var(--neon);border:1px solid rgba(0,180,255,0.3);border-radius:8px;padding:7px 14px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;cursor:pointer;flex-shrink:0;}

/* Stats subtabs */
.stats-subtabs{display:flex;gap:2px;background:rgba(255,255,255,0.04);border-radius:10px;padding:3px;margin:12px 0 8px;}
.stats-subtab{flex:1;background:none;border:none;padding:8px 4px;font-size:12px;font-weight:600;color:#6b7280;cursor:pointer;border-radius:8px;font-family:inherit;transition:all 0.15s;}
.stats-subtab.active{background:var(--surface);color:#e0ddd8;box-shadow:0 1px 4px rgba(0,0,0,0.2);}

/* KPI cards */
.stats-kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.stats-kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;}
.stats-kpi-val{font-family:'Bebas Neue',sans-serif;font-size:32px;line-height:1;margin-bottom:4px;}
.stats-kpi-lbl{font-size:11px;letter-spacing:0.05em;font-weight:600;color:#c8c4be;}
.stats-kpi-sub{font-size:10px;color:#8a8680;margin-top:3px;}

/* Routine breakdown cards */
.routine-stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color 0.15s;}
.routine-stat-card:hover{border-color:rgba(0,180,255,0.3);}
.routine-stat-name{font-size:14px;font-weight:700;color:#e0ddd8;margin-bottom:6px;}
.routine-stat-meta{display:flex;gap:12px;flex-wrap:wrap;}
.routine-stat-item{font-size:11px;color:#8a8680;}
.routine-stat-item span{color:#c8c4be;font-weight:600;}
.routine-bar-track{height:4px;background:rgba(255,255,255,0.06);border-radius:2px;margin-top:10px;overflow:hidden;}
.routine-bar-fill{height:100%;border-radius:2px;background:var(--neon);}

/* Stat card title contrast fix */
.stat-card-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#c8c4be;font-weight:600;margin-bottom:14px;}
.ex-progress-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.ex-kpi{background:var(--surface2);border-radius:8px;padding:10px 8px;text-align:center;}
.ex-kpi-val{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--neon);}
.ex-kpi-lbl{font-size:9px;color:var(--muted2);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
.ex-trend-badge{display:inline-flex;align-items:center;gap:4px;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600;margin-bottom:12px;}
.ex-trend-badge.up{background:rgba(0,255,150,0.12);color:#00ff96;}
.ex-trend-badge.down{background:rgba(255,68,102,0.12);color:#ff4466;}
.ex-trend-badge.flat{background:rgba(255,255,255,0.06);color:var(--muted2);}
.ex-chart-title{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted2);margin:12px 0 6px;}
.ex-no-data{font-size:12px;color:var(--muted2);padding:20px 0;text-align:center;}

/* Charts */
.chart-wrap{position:relative;width:100%;height:160px;margin-top:8px;}
canvas.chart{width:100%!important;height:100%!important;}

.pr-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid var(--border);
}
.pr-item:last-child{border-bottom:none;}
.pr-name{font-size:12px;color:var(--text);}
.pr-val{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--neon);}

.muscle-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.muscle-bar-label{font-size:10px;color:var(--muted2);width:100px;flex-shrink:0;}
.muscle-bar-track{flex:1;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.muscle-bar-fill{height:4px;border-radius:2px;background:linear-gradient(90deg,var(--neon),var(--neon2));transition:width 0.7s cubic-bezier(.16,1,.3,1);}
.muscle-bar-val{font-size:10px;color:var(--neon);width:28px;text-align:right;}

.eq-selector { display:flex; gap:5px; flex-wrap:wrap; padding:8px 14px; border-bottom:1px solid var(--border); }
.eq-btn { background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:4px 10px; font-size:10px; font-weight:600; color:var(--muted2); cursor:pointer; font-family:inherit; letter-spacing:0.5px; transition:all 0.15s; }
.eq-btn:active { opacity:0.7; }
.eq-btn.active { background:rgba(0,180,255,0.15); border-color:var(--neon); color:var(--neon); }
.exercise-select-wrap select{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:10px 12px;font-size:13px;color:var(--text);
  font-family:inherit;outline:none;cursor:pointer;appearance:auto;
}

/* ═══════════════════════════════════════
   FORMS / MODALS
═══════════════════════════════════════ */
.form-group{margin-bottom:14px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.checkbox-row{display:flex;align-items:center;gap:10px;}
.checkbox-row input[type=checkbox]{width:18px;height:18px;accent-color:var(--neon);flex-shrink:0;}
.checkbox-row label{margin-bottom:0;font-size:12px;color:var(--text);}

/* Toast */
.toast{
  position:fixed;bottom:calc(var(--nav-h) + 16px);left:50%;transform:translateX(-50%);
  background:var(--neon);color:#000;
  padding:10px 20px;border-radius:8px;
  font-size:12px;font-weight:500;letter-spacing:1px;
  z-index:2000;opacity:0;transition:opacity 0.3s;
  pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;}

/* GHOST VALUES (previous session) */
.set-input.has-ghost { color: var(--text); }
.set-input.ghost-only {
  color: rgba(0,180,255,0.3) !important;
  font-style: italic;
}
.set-input.ghost-only::placeholder { color: rgba(0,180,255,0.3); }

/* EXERCISE PICKER in routine editor */
.ex-search-wrap { position: relative; margin-bottom: 8px; }
.ex-search-results {
  position: absolute; top: 100%; left: 0; right: 0; z-index: 100;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 8px; max-height: 200px; overflow-y: auto;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.ex-search-item {
  padding: 10px 14px; cursor: pointer; font-size: 12px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.ex-search-item:last-child { border-bottom: none; }
.ex-search-item:active { background: var(--surface2); }
.ex-search-item-name { color: var(--text); }
.ex-search-item-muscle { font-size: 10px; color: var(--muted2); }
.ex-create-option {
  padding: 10px 14px; cursor: pointer; font-size: 12px;
  color: var(--neon); display: flex; align-items: center; gap: 8px;
}
.ex-create-option:active { background: var(--neon-dim); }

/* DELETE SESSION button on recent items */
.recent-delete {
  width: 28px; height: 28px; border-radius: 6px;
  background: none; border: 1px solid rgba(255,68,102,0.2);
  color: var(--red); font-size: 13px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; opacity: 0.6; transition: opacity 0.15s;
}
.recent-delete:active { opacity: 1; background: var(--red-dim); }

/* RESUME WORKOUT banner */
.resume-banner {
  background: var(--neon-dim); border: 1px solid var(--border2);
  border-radius: 12px; padding: 14px 16px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 12px;
}
.resume-banner-text { flex: 1; }
.resume-banner-title { font-size: 12px; font-weight: 500; color: var(--neon); }
.resume-banner-sub { font-size: 10px; color: var(--muted2); margin-top: 2px; }
.resume-btn {
  background: var(--neon); color: #000; border: none;
  border-radius: 6px; padding: 8px 14px;
  font-family: 'DM Mono', monospace; font-size: 10px;
  font-weight: 500; letter-spacing: 1px; cursor: pointer;
  white-space: nowrap;
}

/* ROUTINE CARD COLLAPSE */
.routine-card-body { display: none; }
.routine-card.open .routine-card-body { display: block; }
.routine-chevron { font-size:12px;color:var(--muted);transition:transform 0.2s;margin-left:auto; }
.routine-card.open .routine-chevron { transform:rotate(90deg); }

/* DRAG HANDLE in routine editor */
.re-drag-handle {
  color:var(--muted);font-size:16px;cursor:grab;
  padding:4px 6px;touch-action:none;flex-shrink:0;
}

/* MUSCLE CHIP BUTTONS */
.muscle-chip {
  padding:8px 10px;border-radius:6px;font-size:11px;letter-spacing:1px;
  border:1px solid var(--border);background:var(--surface2);
  color:var(--muted2);cursor:pointer;font-family:'DM Mono',monospace;
  text-align:center;transition:all 0.15s;
}
.muscle-chip.selected {
  background:var(--neon-dim);border-color:var(--border2);color:var(--neon);
}

/* EXERCISE LIBRARY LIST */
.ex-lib-item {
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:12px 14px;margin-bottom:8px;
  display:flex;align-items:center;gap:10px;
}
.ex-lib-info { flex:1;min-width:0; }
.ex-lib-name { font-size:13px;color:var(--text);font-weight:500; }
.ex-lib-tags { display:flex;gap:6px;margin-top:4px;flex-wrap:wrap; }
.ex-lib-actions { display:flex;gap:6px; }
.ex-lib-actions button {
  background:none;border:none;color:var(--muted2);
  cursor:pointer;font-size:15px;padding:4px;transition:color 0.15s;
}
.ex-lib-actions button:hover { color:var(--neon); }

/* Scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* Empty state */
.empty-state{
  text-align:center;padding:40px 20px;
  color:var(--muted);font-size:12px;letter-spacing:1px;
}
.empty-state-icon{font-size:36px;margin-bottom:12px;opacity:0.4;}
.empty-state-text{text-transform:uppercase;letter-spacing:2px;}

/* Confirm dialog */
.confirm-overlay{
  position:fixed;inset:0;background:rgba(7,8,12,0.92);z-index:2000;
  display:none;align-items:center;justify-content:center;padding:20px;
}
.confirm-overlay.open{display:flex;}
.confirm-box{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:16px;padding:24px;width:100%;max-width:320px;
}
.confirm-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;margin-bottom:8px;}
.confirm-text{font-size:12px;color:var(--muted2);margin-bottom:20px;line-height:1.6;}
.confirm-actions{display:flex;gap:10px;}
.confirm-actions .btn{flex:1;}
</style>
</head>
<body>

<div class="app-header">
  <div class="logo">STERK<span>GUTT</span></div>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;">
    <div class="header-right" id="header-date"></div>
    <div style="font-size:9px;color:var(--muted);letter-spacing:1px;">v2.1.0</div>
    <div id="sync-status" style="font-size:9px;letter-spacing:1px;transition:color 0.3s;"></div>
  </div>
</div>

<div class="main" id="main">

  <!-- ══ HOME PAGE ══ -->
  <div class="page active" id="page-home">
    <div style="padding:20px 16px;">
      <div class="home-hero">
        <div class="home-hero-label">Ready to train?</div>
        <div class="home-hero-title" id="home-greeting">STERK GUTT</div>
        <div class="home-hero-sub" id="home-sub">Let's get to work.</div>
        <button class="btn btn-primary" onclick="openWorkoutPicker()">
          <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
          Start Workout
        </button>
        <div id="strava-connect-row" style="margin-top:12px;display:none;">
          <button class="btn btn-ghost" id="strava-home-btn" onclick="handleStravaHomeBtn()" style="width:100%;justify-content:center;gap:8px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.598h4.172L10.463 0l-7 13.828h4.169"/></svg>
            <span id="strava-home-label">Connect Strava</span>
          </button>
        </div>
      </div>

      <div class="section-title">Recent Sessions</div>
      <div class="card" id="recent-list">
        <div class="empty-state">
          <div class="empty-state-icon">💪</div>
          <div class="empty-state-text">No sessions yet</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ WORKOUT PAGE ══ -->
  <div class="page" id="page-workout">
    <div class="workout-header">
      <div class="workout-title-row">
        <div>
          <div class="workout-name" id="active-workout-name">—</div>
          <div style="font-size:10px;color:var(--muted2);margin-top:2px;" id="active-workout-date"></div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
          <div id="rest-timer-badge" style="display:none;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;color:#00b4ff;background:rgba(0,180,255,0.1);border:1px solid rgba(0,180,255,0.2);border-radius:8px;padding:4px 10px;">REST <span id="rest-timer-badge-time">0:00</span></div>
          <div class="workout-timer-badge" id="workout-global-timer">00:00</div>
          <button class="workout-finish-btn" onclick="finishWorkout()">FINISH</button>
        </div>
      </div>
      <button class="save-routine-btn" onclick="saveRoutineChanges()">
        💾 Save exercise changes to routine
      </button>
    </div>
    <div class="workout-body" id="workout-body"></div>
  </div>

  <!-- ══ ROUTINES PAGE ══ -->
  <div class="page" id="page-routines">
    <div style="padding:20px 16px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
        <div class="section-title" style="margin-bottom:0;flex:1;">My Routines</div>
        <button class="btn btn-ghost btn-sm" onclick="openRoutineEditor(null)">+ New</button>
      </div>
      <div id="routines-list"></div>
    </div>
  </div>

  <!-- ══ EXERCISES PAGE ══ -->
  <div class="page" id="page-exercises">
    <div style="padding:20px 16px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div class="section-title" style="margin-bottom:0;flex:1;">Exercise Library</div>
        <button class="btn btn-ghost btn-sm" onclick="openExerciseLibEditor(null)">+ New</button>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;" id="lib-muscle-filters"></div>
      <div id="exercises-list"></div>
    </div>
  </div>

  <!-- ══ STATS PAGE ══ -->
  <div class="page" id="page-stats">

    <!-- TIME PERIOD PRESETS + CUSTOM -->
    <div class="stats-filter-bar">
      <div class="stats-filter-title">Time period</div>
      <div class="stats-preset-row" id="stats-presets"></div>
      <div class="stats-filter-row" id="stats-custom-row" style="display:none;">
        <input type="date" id="stats-from" class="stats-date-input"/>
        <span class="stats-filter-sep">→</span>
        <input type="date" id="stats-to" class="stats-date-input"/>
        <button class="stats-apply-btn-sm" onclick="applyCustomRange()">Go</button>
      </div>
    </div>

    <!-- SUB-TABS: Overview / Routines / Exercise -->
    <div class="stats-subtabs" id="stats-subtabs">
      <button class="stats-subtab active" data-tab="overview" onclick="setStatsSubtab('overview')">Overview</button>
      <button class="stats-subtab" data-tab="routines" onclick="setStatsSubtab('routines')">Routines</button>
      <button class="stats-subtab" data-tab="exercise" onclick="setStatsSubtab('exercise')">Exercise</button>
    </div>

    <!-- OVERVIEW TAB -->
    <div id="stats-tab-overview" class="stats-tab-body">
      <div class="stats-kpi-grid" id="stats-kpi-grid"></div>
      <div class="stat-card" style="margin-bottom:12px;">
        <div class="stat-card-title">Volume by muscle group</div>
        <div id="muscle-bars"></div>
      </div>
      <div class="stat-card" style="margin-bottom:12px;">
        <div class="stat-card-title">Weekly sessions</div>
        <div style="position:relative;width:100%;height:160px;margin-top:8px;overflow:hidden;">
          <canvas id="chart-volume" style="position:absolute;top:0;left:0;width:100%;height:100%;"></canvas>
        </div>
      </div>
    </div>

    <!-- ROUTINES TAB -->
    <div id="stats-tab-routines" class="stats-tab-body" style="display:none;">
      <div id="stats-routines-body"></div>
    </div>

    <!-- EXERCISE TAB -->
    <div id="stats-tab-exercise" class="stats-tab-body" style="display:none;">
      <div class="stat-card" style="margin-bottom:12px;">
        <div class="exercise-select-wrap">
          <select id="ex-select" onchange="renderExerciseSection()">
            <option value="">— Select exercise —</option>
          </select>
        </div>
        <div id="exercise-progress-body"></div>
      </div>
    </div>

  </div>

</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav" style="grid-template-columns:repeat(5,1fr);">
  <button class="nav-btn active" onclick="showPage('home',this)" id="nav-home">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
    Home
  </button>
  <button class="nav-btn" onclick="showPage('workout',this)" id="nav-workout">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
    Workout
  </button>
  <button class="nav-btn" onclick="showPage('routines',this)" id="nav-routines">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
    Routines
  </button>
  <button class="nav-btn" onclick="showPage('exercises',this)" id="nav-exercises">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
    Exercises
  </button>
  <button class="nav-btn" onclick="showPage('stats',this)" id="nav-stats">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
    Stats
  </button>
</nav>

<!-- WORKOUT PICKER MODAL -->
<div class="modal-overlay" id="workout-picker">
  <div class="modal-header">
    <div class="modal-title">START WORKOUT</div>
    <div class="modal-close" onclick="closeModal('workout-picker')">✕</div>
  </div>
  <div id="picker-routine-list"></div>
  <button class="new-routine-btn" onclick="closeModal('workout-picker');openRoutineEditor(null)">
    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v16m8-8H4"/></svg>
    Create New Routine
  </button>
</div>

<!-- ROUTINE EDITOR MODAL -->
<div class="modal-overlay" id="routine-editor">
  <div class="modal-header">
    <div class="modal-title" id="routine-editor-title">NEW ROUTINE</div>
    <div class="modal-close" onclick="closeModal('routine-editor')">✕</div>
  </div>
  <div class="form-group">
    <label>Routine Name</label>
    <input type="text" id="re-name" placeholder="e.g. Upper 1"/>

let _routines  = [];
let _sessions  = [];
let _activeSession = null;

// Shim for legacy load() calls that still exist

function load(key) {
  if (key === SK.exercises)     return _exercises.length ? _exercises : null;
  if (key === SK.routines)      return _routines.length  ? _routines  : null;
  if (key === SK.sessions)      return _sessions.length  ? _sessions  : null;
  if (key === SK.activeSession) return _activeSession;
  return null;
}
function save(key, val) {
  if (key === SK.exercises)     { _exercises = val || []; return; }
  if (key === SK.routines)      { _routines  = val || []; return; }
  if (key === SK.sessions)      { _sessions  = val || []; return; }
  if (key === SK.activeSession) { _activeSession = val;   return; }
}

function setSyncStatus(status) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  if (status === 'syncing') { el.textContent = '⟳ syncing'; el.style.color = 'var(--muted2)'; }
  else if (status === 'ok') { el.textContent = '✓ synced'; el.style.color = 'var(--neon2)'; setTimeout(() => { el.textContent = ''; }, 3000); }
  else if (status === 'offline') { el.textContent = '○ offline'; el.style.color = 'var(--muted)'; }
  else { el.textContent = ''; }
}

// ── EXERCISES ────────────────────────────────────────────
async function dbLoadExercises() {
  try {
    const { data, error } = await sb.from('exercises').select('*').eq('user_id', USER_ID).order('name');
    if (error) throw error;
    if (data && data.length) {
      _exercises = data.map(e => ({ id:e.id, name:e.name, muscle:e.muscle, unilateral:e.unilateral }));
    } else {
      // First time — seed defaults
      await dbSeedExercises();
    }
  } catch(e) { console.warn('Load exercises failed:', e.message); }
}

async function dbSeedExercises() {
  const rows = DEFAULT_EXERCISES.map(e => ({ ...e, user_id: USER_ID }));
  const { error } = await sb.from('exercises').upsert(rows, { onConflict: 'id' });
  if (!error) _exercises = [...DEFAULT_EXERCISES];
}

async function dbSaveExercise(ex) {
  try {
    const { error } = await sb.from('exercises').upsert({ ...ex, user_id: USER_ID }, { onConflict: 'id' });
    if (error) throw error;
    const idx = _exercises.findIndex(e => e.id === ex.id);
    if (idx >= 0) _exercises[idx] = ex; else _exercises.push(ex);
  } catch(e) { console.warn('Save exercise failed:', e.message); }
}

async function dbDeleteExercise(id) {
  try {
    await sb.from('exercises').delete().eq('id', id).eq('user_id', USER_ID);
    _exercises = _exercises.filter(e => e.id !== id);
  } catch(e) { console.warn('Delete exercise failed:', e.message); }
}

// ── ROUTINES ─────────────────────────────────────────────
async function dbSaveRoutine(routine) {
  try {
    setSyncStatus('syncing');
    const { error } = await sb.from('routines').upsert({
      id: routine.id, user_id: USER_ID, name: routine.name,
      exercises: routine.exercises,
      created_at: new Date(routine.createdAt).toISOString(),
      updated_at: new Date().toISOString(),
    }, { onConflict: 'id' });
    if (error) throw error;
    const idx = _routines.findIndex(r => r.id === routine.id);
    if (idx >= 0) _routines[idx] = routine; else _routines.push(routine);
    setSyncStatus('ok');
  } catch(e) { console.warn('Save routine failed:', e.message); setSyncStatus('offline'); }
}

async function dbDeleteRoutine(id) {
  try {
    setSyncStatus('syncing');
    await sb.from('routines').delete().eq('id', id).eq('user_id', USER_ID);
    _routines = _routines.filter(r => r.id !== id);
    setSyncStatus('ok');
  } catch(e) { console.warn('Delete routine failed:', e.message); setSyncStatus('offline'); }
}

async function dbLoadRoutines() {
  try {
    const { data, error } = await sb.from('routines').select('*').eq('user_id', USER_ID).order('created_at');
    if (error) throw error;
    if (data && data.length) {
      _routines = data.map(r => ({ id:r.id, name:r.name, exercises:r.exercises, createdAt:new Date(r.created_at).getTime() }));
    } else {
      // Seed default routines on first use
      for (const r of DEFAULT_ROUTINES) await dbSaveRoutine(r);
    }
    return _routines;
  } catch(e) { console.warn('Load routines failed:', e.message); return []; }
}

// ── SESSIONS ─────────────────────────────────────────────
async function dbSaveSession(session) {
  try {
    setSyncStatus('syncing');
    const { error } = await sb.from('sessions').upsert({
      id: session.id, user_id: USER_ID,
      routine_id: session.routineId || null,
      routine_name: session.routineName,
      started_at: new Date(session.startedAt).toISOString(),
      finished_at: session.duration ? new Date(session.startedAt + session.duration * 1000).toISOString() : null,
      duration: session.duration || null,
      exercises: session.exercises,
      is_active: !session.duration,
    }, { onConflict: 'id' });
    if (error) throw error;
    setSyncStatus('ok');
  } catch(e) { console.warn('Save session failed:', e.message); setSyncStatus('offline'); }
}

async function dbLoadSessions() {
  try {
    const { data, error } = await sb.from('sessions').select('*').eq('user_id', USER_ID).eq('is_active', false).order('started_at');
    if (error) throw error;
    if (data) {
      _sessions = data.map(s => ({
        id:s.id, routineId:s.routine_id, routineName:s.routine_name,
        startedAt:new Date(s.started_at).getTime(), duration:s.duration, exercises:s.exercises,
      }));
    }
    return _sessions;
  } catch(e) { console.warn('Load sessions failed:', e.message); return []; }
}

async function dbDeleteSession(id) {
  try {
    const { error } = await sb.from('sessions').delete().eq('id', id);
    if (error) throw error;
    _sessions = _sessions.filter(s => s.id !== id);
  } catch(e) { console.warn('Delete session failed:', e.message); }
}

async function dbLoadActiveSession() {
  try {
    const { data } = await sb.from('sessions').select('*').eq('user_id', USER_ID).eq('is_active', true).order('started_at', { ascending: false }).limit(1);
    if (data && data.length) {
      _activeSession = {
        id:data[0].id, routineId:data[0].routine_id, routineName:data[0].routine_name,
        startedAt:new Date(data[0].started_at).getTime(), exercises:data[0].exercises,
      };
    }
    return _activeSession;
  } catch(e) { console.warn('Load active session failed:', e.message); return null; }
}

async function syncFromCloud() {
  setSyncStatus('syncing');
  USER_ID = await getUserId();
  await Promise.all([dbLoadExercises(), dbLoadRoutines(), dbLoadSessions()]);
  setSyncStatus('ok');

// ── Get last performance for an exercise across ALL sessions ──
function getLastPerformance(exName) {
  for (let i = _sessions.length - 1; i >= 0; i--) {
    const s = _sessions[i];
    const ex = (s.exercises || []).find(e => e.name === exName);
    if (ex && ex.sets && ex.sets.some(st => st.logged)) return ex.sets.filter(st => st.logged);
  }
  return null;
}

  const sessions = load(SK.sessions) || [];

  const list = document.getElementById('recent-list');

  const now = new Date();

  const greet = hour < 12 ? 'GOOD MORNING' : hour < 17 ? 'GOOD AFTERNOON' : 'GOOD EVENING';
  document.getElementById('home-greeting').textContent = greet;

  // Resume banner — show if there's an active session saved
  const heroEl = document.querySelector('.home-hero');
  const existingBanner = document.getElementById('resume-banner');

    list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">💪</div><div class="empty-state-text">No sessions yet</div></div>';

  }

  list.innerHTML = '';

    const dur = s.duration ? formatDuration(s.duration) : '—';

      </div>

    item.querySelector('.recent-delete').addEventListener('click', e => {

function openSessionEditor(sessionId) {

    exHeader.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;';

    const eqTag = document.createElement('span');
    eqTag.style.cssText = `font-size:10px;font-weight:600;padding:3px 9px;border-radius:12px;${ex.equipment?'color:var(--neon);background:rgba(0,180,255,0.1);border:1px solid rgba(0,180,255,0.2);':'color:#4b5563;'}`;
    eqTag.textContent = ex.equipment || 'Untagged';

    const btnRow = document.createElement('div');
    btnRow.style.cssText = 'display:flex;gap:6px;flex-wrap:wrap;';

    EQUIPMENT.forEach(eq => {

      btn.textContent = eq;
      const isActive = ex.equipment === eq;
      btn.style.cssText = `padding:5px 12px;border-radius:16px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;border:1px solid ${isActive?'var(--neon)':'rgba(255,255,255,0.1)'};background:${isActive?'rgba(0,180,255,0.12)':'transparent'};color:${isActive?'var(--neon)':'#6b7280'};`;

      btn.addEventListener('click', async () => {

        save(SK.sessions, allSessions);

        if (cached) { const cex=(cached.exercises||[]).find(e=>e.name===ex.name); if(cex) cex.equipment=ex.equipment; }

        eqTag.textContent = ex.equipment || 'Untagged';
        eqTag.style.color = ex.equipment ? 'var(--neon)' : '#4b5563';
        eqTag.style.background = ex.equipment ? 'rgba(0,180,255,0.1)' : 'transparent';

// ═══════════════════════════════════════════
// ACTIVE WORKOUT
// ═══════════════════════════════════════════
let activeSession = null;
let globalTimerInterval = null;
// Per-set timers: keyed by "ei-si"
let setTimers = {}; // { "ei-si": { interval, startTime } }
// Active rest timer
let restTimer = { interval: null, startTime: null, el: null };

function startWorkout(routineId) {
  closeModal('workout-picker');
  const routines = load(SK.routines) || [];
  const routine = routines.find(r => r.id === routineId);
  if (!routine) return;

  activeSession = {
    id: Date.now(),
    routineId,
    routineName: routine.name,
    startedAt: Date.now(),
    duration: null,
    exercises: routine.exercises.map(ex => {
      const prevSets = getLastPerformance(ex.name) || [];
      return {
        id: ex.id,
        name: ex.name,
        muscle: ex.muscle,
        unilateral: ex.unilateral,
        startedAt: null,
        duration: null,
        collapsed: true,
        equipment: getEquipmentPref(ex.name),
        sets: Array.from({ length: ex.sets }, (_, i) => ({
          num: i + 1,
          weight: '', reps: '', repsL: '', repsR: '',
          note: '', logged: false, restDuration: null,
          setStartTime: null, setDuration: null,
          // state: 'idle' | 'active' | 'logged'
          state: 'idle',
          ghostWeight: prevSets[i] ? (prevSets[i].weight || '') : '',
          ghostReps:   prevSets[i] ? (prevSets[i].reps   || '') : '',
          ghostRepsL:  prevSets[i] ? (prevSets[i].repsL  || '') : '',
          ghostRepsR:  prevSets[i] ? (prevSets[i].repsR  || '') : '',
        }))
      };
    })
  };

  setTimers = {};
  autoSaveSession();
  renderWorkoutPage();
  showPage('workout', document.getElementById('nav-workout'));
  startGlobalTimer();
}

function renderWorkoutPage() {
  if (!activeSession) return;
  document.getElementById('active-workout-name').textContent = activeSession.routineName;
  document.getElementById('active-workout-date').textContent =
    new Date(activeSession.startedAt).toLocaleDateString('no-NO', { weekday:'long', day:'numeric', month:'long' });
  renderWorkoutBody();
}

function renderWorkoutBody() {
  const body = document.getElementById('workout-body');
  body.innerHTML = activeSession.exercises.map((ex, ei) => buildExCard(ex, ei)).join('');

  // Add exercise button at the bottom
  const addExBtn = document.createElement('button');
  addExBtn.className = 'btn btn-ghost';
  addExBtn.style.cssText = 'width:100%;margin:12px 0 4px;border:1.5px dashed rgba(0,180,255,0.3);color:var(--neon);letter-spacing:1px;';
  addExBtn.textContent = '+ ADD EXERCISE';
  addExBtn.addEventListener('click', () => openAddExerciseDuringWorkout());
  body.appendChild(addExBtn);

  attachDragHandles();
  activeSession.exercises.forEach((ex, ei) => {
    ex.sets.forEach((s, si) => {
      if (s.state === 'active' && s.setStartTime) startSetTimerDisplay(ei, si, s.setStartTime);
    });
  });
  if (restTimer.interval && restTimer.el) {
    const { ei, si } = restTimer;
    if (ei !== undefined) showRestBanner(ei, si, restTimer.startTime);
  }
}

function buildExCard(ex, ei) {
  const logged = ex.sets.filter(s => s.state === 'logged').length;
  const total  = ex.sets.length;
  const isUni  = ex.unilateral;

  const headerCols = isUni
    ? 'KG · REPS L · REPS R · NOTE'
    : 'KG · REPS · NOTE';

  let setHeaderHTML = isUni
    ? `<div class="set-header-row unilateral"><span>#</span><span style="text-align:center">KG</span><span style="text-align:center">L</span><span style="text-align:center">R</span><span style="text-align:center">NOTE</span></div>`
    : `<div class="set-header-row bilateral"><span>#</span><span style="text-align:center">KG</span><span style="text-align:center">REPS</span><span style="text-align:center">NOTE</span></div>`;

  const setsHTML = ex.sets.map((s, si) => buildSetRow(s, si, ei, isUni)).join('');

  const EQUIPMENT = ['Barbell','Dumbbell','Cable','Bodyweight','Machine'];
  const eq = ex.equipment || null;
  const eqHTML = `<div class="eq-selector" id="eq-${ei}">
    ${EQUIPMENT.map(e => `<button class="eq-btn${eq===e?' active':''}" onclick="setEquipment(${ei},'${e}')">${e}</button>`).join('')}
  </div>`;

  return `<div class="ex-card ${ex.collapsed ? 'collapsed' : ''}" id="ex-card-${ei}" data-ei="${ei}">
    <div class="ex-card-header">
      <span class="ex-drag-handle" data-ei="${ei}">⠿</span>
      <div class="ex-card-title" onclick="toggleExCollapse(${ei})">
        <div class="ex-card-name">${ex.name}</div>
        <div class="ex-card-meta" id="ex-meta-${ei}">${ex.muscle}${ex.unilateral?' · Uni':''} · ${logged}/${total} sets${eq?` · ${eq}`:''}</div>
      </div>
      <span class="ex-collapse-btn" onclick="toggleExCollapse(${ei})">▾</span>
    </div>
    <div class="ex-card-body">
      ${eqHTML}
      ${setHeaderHTML}
      <div id="sets-${ei}">${setsHTML}</div>
      <div class="ex-actions">
        <button class="btn btn-ghost btn-sm" onclick="addSet(${ei})">+ Set</button>
        <button class="btn btn-danger btn-sm" onclick="removeLastSet(${ei})">− Set</button>
      </div>
    </div>
  </div>`;
}

function buildSetRow(s, si, ei, isUni) {
  const stateClass = s.state === 'active' ? 'set-active' : s.state === 'logged' ? 'set-logged' : '';
  const disabled   = s.state !== 'logged' ? '' : 'disabled'; // inputs editable after stop, locked after logged
  const isLogged   = s.state === 'logged';
  const isActive   = s.state === 'active';

  function gClass(val, ghost) {
    if (isLogged) return 'logged';
    if (val !== '' && val !== null && val !== undefined) return '';
    if (ghost !== '' && ghost !== null && ghost !== undefined) return 'ghost-only';
    return '';
  }
  function gPH(val, ghost, fb) {
    if (val !== '' && val !== null && val !== undefined) return val; // show value
    if (ghost !== '' && ghost !== null && ghost !== undefined) return ghost;
    return fb;
  }

  // Inputs always editable
  const inputDisabled = isLogged ? '' : '';
  const inputOpacity  = '';

  let btnLabel, btnClass;
  if (s.state === 'idle')   { btnLabel = 'START'; btnClass = 'state-idle'; }
  if (s.state === 'active') { btnLabel = 'STOP';  btnClass = 'state-active'; }
  if (s.state === 'logged') { btnLabel = '✓ Set done'; btnClass = 'state-logged'; }

  // Set duration badge
  const durBadge = s.setDuration
    ? `<span style="font-size:10px;color:var(--muted2);letter-spacing:1px;">${formatMMSS(s.setDuration)}</span>`
    : s.state === 'active'
    ? `<span id="set-timer-${ei}-${si}" style="font-size:10px;color:var(--neon);letter-spacing:1px;font-family:'Bebas Neue',sans-serif;">0:00</span>`
    : '';

  const inputs = isUni ? `
    <input class="set-input ${gClass(s.weight,s.ghostWeight)}" type="number" inputmode="decimal" min="0" step="0.5"
      value="${s.weight}" placeholder="${gPH(s.weight,s.ghostWeight,'kg')}" style="${inputOpacity}"
      ${inputDisabled} oninput="updateSet(${ei},${si},'weight',this.value)" onchange="updateSet(${ei},${si},'weight',this.value)"/>
    <input class="set-input ${gClass(s.repsL,s.ghostRepsL)}" type="number" inputmode="numeric" min="0"
      value="${s.repsL}" placeholder="${gPH(s.repsL,s.ghostRepsL,'L')}" style="${inputOpacity}"
      ${inputDisabled} oninput="updateSet(${ei},${si},'repsL',this.value)" onchange="updateSet(${ei},${si},'repsL',this.value)"/>
    <input class="set-input ${gClass(s.repsR,s.ghostRepsR)}" type="number" inputmode="numeric" min="0"
      value="${s.repsR}" placeholder="${gPH(s.repsR,s.ghostRepsR,'R')}" style="${inputOpacity}"
      ${inputDisabled} oninput="updateSet(${ei},${si},'repsR',this.value)" onchange="updateSet(${ei},${si},'repsR',this.value)"/>` : `
    <input class="set-input ${gClass(s.weight,s.ghostWeight)}" type="number" inputmode="decimal" min="0" step="0.5"
      value="${s.weight}" placeholder="${gPH(s.weight,s.ghostWeight,'kg')}" style="${inputOpacity}"
      ${inputDisabled} oninput="updateSet(${ei},${si},'weight',this.value)" onchange="updateSet(${ei},${si},'weight',this.value)"/>
    <input class="set-input ${gClass(s.reps,s.ghostReps)}" type="number" inputmode="numeric" min="0"
      value="${s.reps}" placeholder="${gPH(s.reps,s.ghostReps,'reps')}" style="${inputOpacity}"
      ${inputDisabled} oninput="updateSet(${ei},${si},'reps',this.value)" onchange="updateSet(${ei},${si},'reps',this.value)"/>`;

  return `<div class="set-row ${stateClass}" id="set-row-${ei}-${si}">
    <div class="set-row-top ${isUni?'unilateral':'bilateral'}">
      <div class="set-num">${si+1}</div>
      ${inputs}
    </div>
    <div class="set-note-row">
      <input class="set-note" placeholder="note..." value="${s.note||''}"
        ${inputDisabled} onchange="updateSet(${ei},${si},'note',this.value)"/>
    </div>
    <div class="set-btn-row">
      <button class="set-start-btn ${btnClass}" onclick="handleSetBtn(${ei},${si})">${btnLabel}</button>
      ${durBadge}
    </div>
  </div>`;
}

// ── Set button handler: START → STOP (logged), next START clears rest ──
function handleSetBtn(ei, si) {
  if (!activeSession) return;
  const ex  = activeSession.exercises[ei];
  const set = ex.sets[si];

  if (set.state === 'idle') {
    // ── START ── clear rest timer, start set
    clearRestBanner();

    if (!ex.startedAt) ex.startedAt = Date.now();
    set.state = 'active';
    set.setStartTime = Date.now();
    startSetTimerDisplay(ei, si, set.setStartTime);

    dbSaveSession(activeSession);
    refreshSetRow(ei, si);

  } else if (set.state === 'active') {
    // ── STOP → immediately mark as logged, start rest timer ──
    const elapsed = Math.floor((Date.now() - set.setStartTime) / 1000);
    set.setDuration = elapsed;
    set.state  = 'logged';
    set.logged = true;

    stopSetTimerDisplay(ei, si);
    showRestBanner(ei, si, Date.now());

    dbSaveSession(activeSession);
    refreshSetRow(ei, si);
    updateExMeta(ei);

  } else if (set.state === 'logged') {
    // Tap again to un-log
    set.state  = 'idle';
    set.logged = false;
    set.setStartTime = null;
    set.setDuration  = null;
    stopSetTimerDisplay(ei, si);
    dbSaveSession(activeSession);
    refreshSetRow(ei, si);
    updateExMeta(ei);
  }
}

// ── Set timer display ──────────────────────────────────────
function startSetTimerDisplay(ei, si, startTime) {
  const key = `${ei}-${si}`;
  if (setTimers[key]) clearInterval(setTimers[key].interval);
  setTimers[key] = {
    startTime,
    interval: setInterval(() => {
      const el = document.getElementById(`set-timer-${ei}-${si}`);
      if (!el) { clearInterval(setTimers[key]?.interval); return; }
      el.textContent = formatMMSS(Math.floor((Date.now() - startTime) / 1000));
    }, 1000)
  };
}

function stopSetTimerDisplay(ei, si) {
  const key = `${ei}-${si}`;
  if (setTimers[key]) { clearInterval(setTimers[key].interval); delete setTimers[key]; }
}

// ── Rest banner ───────────────────────────────────────────
function showRestBanner(ei, si, startTime) {
  clearRestBanner();
  restTimer.startTime = startTime;
  restTimer.ei = ei; restTimer.si = si;

  // Insert banner after the set row that just stopped
  const setRow = document.getElementById(`set-row-${ei}-${si}`);
  if (!setRow) return;

  const badge = document.getElementById('rest-timer-badge');
  const badgeTime = document.getElementById('rest-timer-badge-time');
  if (badge) badge.style.display = '';

  restTimer.interval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    if (badgeTime) badgeTime.textContent = formatMMSS(elapsed);
  }, 1000);
  restTimer.el = badge;
}

function clearRestBanner() {
  if (restTimer.interval) { clearInterval(restTimer.interval); restTimer.interval = null; }
  const badge = document.getElementById('rest-timer-badge');
  if (badge) { badge.style.display = 'none'; }
  const badgeTime = document.getElementById('rest-timer-badge-time');
  if (badgeTime) badgeTime.textContent = '0:00';
  restTimer.el = null; restTimer.startTime = null;
  restTimer.ei = undefined; restTimer.si = undefined;
}

// ── Refresh a single set row without re-rendering all ─────
function refreshSetRow(ei, si) {
  const ex  = activeSession.exercises[ei];
  const set = ex.sets[si];
  const rowEl = document.getElementById(`set-row-${ei}-${si}`);
  if (rowEl) rowEl.outerHTML = buildSetRow(set, si, ei, ex.unilateral);
  // If set just became active, start its timer
  if (set.state === 'active') startSetTimerDisplay(ei, si, set.setStartTime);
}

function updateExMeta(ei) {
  const ex  = activeSession.exercises[ei];
  const el  = document.getElementById(`ex-meta-${ei}`);
  if (el) el.textContent = `${ex.muscle}${ex.unilateral?' · Uni':''} · ${ex.sets.filter(s=>s.state==='logged').length}/${ex.sets.length} sets`;
}

function updateSet(ei, si, field, val) {
  if (!activeSession) return;
  activeSession.exercises[ei].sets[si][field] = val;
  autoSaveSession();
}

  function renderList(filter='') {

      list.innerHTML = `<div style="color:#4b5563;font-size:12px;padding:12px 0;text-align:center;">No exercises found</div>`;

  const numSets = prevSets.length || 3;
  activeSession.exercises.push({
    id: ex.id,
    name: ex.name,
    muscle: ex.muscle,
    unilateral: ex.unilateral,
    startedAt: null,
    duration: null,
    collapsed: false, // expand newly added exercise
    sets: Array.from({ length: numSets }, (_, i) => ({
      num: i+1,
      weight:'', reps:'', repsL:'', repsR:'', note:'',
      logged:false, restDuration:null,

function setEquipment(ei, equipment) {
  if (!activeSession) return;
  const ex = activeSession.exercises[ei];
  ex.equipment = ex.equipment === equipment ? null : equipment; // toggle off if same
  autoSaveSession();

  const card = document.getElementById(`ex-card-${ei}`);

  const prefs = JSON.parse(localStorage.getItem('sg_eq_prefs')||'{}');

function addSet(ei) {

  ex.sets.push({
    num: ex.sets.length + 1,
    weight: '', reps: '', repsL: '', repsR: '', note: '',
    logged: false, restDuration: null,
    setStartTime: null, setDuration: null, state: 'idle',

  });

  if (ex.sets.length <= 1) return;
  const last = ex.sets.pop();
  stopSetTimerDisplay(ei, ex.sets.length);

  if (container && container.lastChild) container.removeChild(container.lastChild);

function saveRoutineChanges() {
  if (!activeSession || !activeSession.routineId) return;
  showConfirm(
    'Save Routine Changes?',
    'This will update the exercise list and order in the saved routine.',
    () => {
      const routines = load(SK.routines) || [];
      const idx = routines.findIndex(r => r.id === activeSession.routineId);
      if (idx < 0) { showToast('Routine not found'); return; }

      // Update exercises — keep original set counts from routine, just sync order/names
      routines[idx].exercises = activeSession.exercises.map(ex => ({
        id:         ex.id,
        name:       ex.name,
        muscle:     ex.muscle,
        unilateral: ex.unilateral,
        sets:       ex.sets.length,
      }));

      save(SK.routines, routines);
      dbSaveRoutine(routines[idx]);
      showToast('Routine updated ✓');
    }
  );
}

// ─── Global workout timer ───
function startGlobalTimer() {
  clearInterval(globalTimerInterval);
  globalTimerInterval = setInterval(() => {
    if (!activeSession) return;
    const elapsed = Math.floor((Date.now() - activeSession.startedAt) / 1000);
    document.getElementById('workout-global-timer').textContent = formatMMSS(elapsed);
  }, 1000);
}

function finishWorkout() {
  showConfirm('Finish Workout?', 'This will save your session and return you to the home screen.', async () => {
    if (!activeSession) return;
    activeSession.duration = Math.floor((Date.now() - activeSession.startedAt) / 1000);
    clearInterval(globalTimerInterval);
    clearRestBanner();
    Object.values(setTimers).forEach(t => clearInterval(t.interval));
    setTimers = {};

    // Finish exercise durations
    activeSession.exercises.forEach(ex => {
      if (ex.startedAt && !ex.duration) {
        ex.duration = Math.floor((Date.now() - ex.startedAt) / 1000);
      }
    });

    await dbSaveSession(activeSession);
    _activeSession = null;

    const completedSession = { ...activeSession };
    activeSession = null;

    // Add to in-memory sessions so home page shows it immediately
    _sessions.push({
      id: completedSession.id,
      routineId: completedSession.routineId,
      routineName: completedSession.routineName,
      startedAt: completedSession.startedAt,
      duration: completedSession.duration,
      exercises: completedSession.exercises,
    });

    showToast('Workout saved! 💪');
    showPage('home', document.getElementById('nav-home'));
    renderHome();

    // Offer Strava upload if connected
    if (stravaConnected) {
      setTimeout(() => showStravaUploadPrompt(completedSession), 800);
    }
  });
}

function autoSaveSession() {
  if (activeSession) {
    dbSaveSession(activeSession); // Supabase only
  }
}

// ─── Drag to reorder exercises ───
let dragSrc = null;

function attachDragHandles() {
  document.querySelectorAll('.ex-drag-handle').forEach(handle => {
    handle.addEventListener('touchstart', onHandleTouchStart, { passive: false });
  });
}

let dragCard = null, dragClone = null, dragStartY = 0, dragCardH = 0;

function onHandleTouchStart(e) {
  e.preventDefault();
  const ei = +e.currentTarget.dataset.ei;
  dragCard = document.getElementById(`ex-card-${ei}`);
  dragSrc = ei;
  dragStartY = e.touches[0].clientY;
  dragCardH = dragCard.offsetHeight;

  dragCard.style.opacity = '0.3';
  document.addEventListener('touchmove', onDragTouchMove, { passive: false });
  document.addEventListener('touchend', onDragTouchEnd);
}

function onDragTouchMove(e) {
  e.preventDefault();
  const y = e.touches[0].clientY;
  const cards = [...document.querySelectorAll('.ex-card')];
  cards.forEach((card, i) => {
    const rect = card.getBoundingClientRect();
    if (i !== dragSrc && y > rect.top && y < rect.bottom) {
      if (i < dragSrc) {
        card.parentNode.insertBefore(dragCard, card);
        // Reorder in state
        const ex = activeSession.exercises.splice(dragSrc, 1)[0];
        activeSession.exercises.splice(i, 0, ex);
        dragSrc = i;
        renderWorkoutBody();
        dragCard = document.getElementById(`ex-card-${dragSrc}`);
        dragCard.style.opacity = '0.3';
      } else {
        card.parentNode.insertBefore(dragCard, card.nextSibling);
        const ex = activeSession.exercises.splice(dragSrc, 1)[0];
        activeSession.exercises.splice(i, 0, ex);
        dragSrc = i;
        renderWorkoutBody();
        dragCard = document.getElementById(`ex-card-${dragSrc}`);
        dragCard.style.opacity = '0.3';
      }
    }
  });
}

function onDragTouchEnd() {
  document.removeEventListener('touchmove', onDragTouchMove);
  document.removeEventListener('touchend', onDragTouchEnd);
  if (dragCard) { dragCard.style.opacity = '1'; dragCard = null; }
  dragSrc = null;
  autoSaveSession();
  renderWorkoutBody();
}

// ═══════════════════════════════════════════
// ── EXERCISE PROGRESSION ENGINE ──────────────────────────────────────────

// ═══════════════════════════════════════════════════════════════════════════
// EXERCISE PROGRESSION ENGINE — shared by Sterk Gutt + Calendar stats
// ═══════════════════════════════════════════════════════════════════════════

// Marius's dumbbell steps in kg
const DB_STEPS = [6, 10.5, 15, 19.5, 24, 28.5, 33, 40];

// Exercises where jumping a full dumbbell step is hard
const COMPOUND_PRESS = ['Bench Press','Incline Bench Press','Dumbbell OHP','Push Up','Floor Press'];

function nextDBStep(currentKg) {
  const i = DB_STEPS.findIndex(s => s >= currentKg);
  if (i === -1) return null;
  if (DB_STEPS[i] === currentKg) return DB_STEPS[i+1] ?? null;
  return DB_STEPS[i]; // next step up from current
}

function prevDBStep(currentKg) {
  const i = DB_STEPS.findLastIndex(s => s <= currentKg);
  return i > 0 ? DB_STEPS[i-1] : null;
}

function linearTrend(values) {
  // Returns slope per session (kg/session)
  const n = values.length;
  if (n < 2) return 0;
  const xs = values.map((_, i) => i);
  const mx = xs.reduce((a,b)=>a+b,0)/n;
  const my = values.reduce((a,b)=>a+b,0)/n;
  const num = xs.reduce((a,x,i) => a + (x-mx)*(values[i]-my), 0);
  const den = xs.reduce((a,x)   => a + (x-mx)**2, 0);
  return den === 0 ? 0 : num/den;
}

function buildExercisePoints(sessions, exName, equipFilter) {
  // Returns array of { dateStr, weight, reps, sets, est1RM, volLoad, bestLabel }
  // one entry per session (best set of the session)
  const points = [];
  const sessionsInOrder = [...sessions].sort((a,b)=>
    new Date(a.startedAt||a.started_at) - new Date(b.startedAt||b.started_at));

  sessionsInOrder.forEach(s => {
    (s.exercises||[]).forEach(ex => {
      if (ex.name !== exName) return;
      if (equipFilter && equipFilter !== 'All' && (ex.equipment||'Unspecified') !== equipFilter) return;
      const logged = (ex.sets||[]).filter(st => st.logged);
      if (!logged.length) return;

      // Best set = highest est 1RM
      let bestW=0, bestR=0, best1RM=0;
      logged.forEach(st => {
        const w = parseFloat(st.weight)||0;
        const r = ex.unilateral
          ? Math.max(parseFloat(st.repsL)||0, parseFloat(st.repsR)||0)
          : parseFloat(st.reps)||0;
        const rm = r>0 ? w*(1+r/30) : 0;
        if (rm > best1RM) { best1RM=rm; bestW=w; bestR=r; }
      });

      const volLoad = Math.round(logged.reduce((a,st)=>{
        const w=parseFloat(st.weight)||0;
        const r=ex.unilateral?((parseFloat(st.repsL)||0)+(parseFloat(st.repsR)||0)):parseFloat(st.reps)||0;
        return a+w*r;
      },0));

      const startedAt = s.startedAt||s.started_at;
      points.push({
        date: new Date(startedAt),
        dateStr: new Date(startedAt).toLocaleDateString('no-NO',{day:'numeric',month:'short'}),
        weight: bestW,
        reps: bestR,
        sets: logged.length,
        est1RM: Math.round(best1RM*10)/10,
        volLoad,
        bestLabel: bestW>0 ? `${bestW}kg×${bestR}` : '—',
        equipment: ex.equipment||null,
      });
    });
  });
  return points;
}

function assessProgression(points) {
  // Returns { status, trendPerMonth, plateau, lastN }
  if (points.length < 2) return { status:'insufficient', trendPerMonth:0, plateau:false };

  const weights = points.map(p=>p.weight);
  const slopePerSession = linearTrend(weights);
  const trendPerMonth = Math.round(slopePerSession * 4 * 10) / 10; // ~4 sessions/month

  const last3 = points.slice(-3);
  const last3Weights = last3.map(p=>p.weight);
  const maxInLast3 = Math.max(...last3Weights);
  const minInLast3 = Math.min(...last3Weights);
  const plateau = last3.length >= 3 && maxInLast3 - minInLast3 < 1; // <1kg variance
  const regressing = last3.length >= 3 && last3Weights[last3Weights.length-1] < last3Weights[0] - 0.5;

  let status = 'progressing';
  if (regressing) status = 'regressing';
  else if (plateau) status = 'plateau';
  else if (slopePerSession <= 0.01) status = 'plateau';

  return { status, trendPerMonth, plateau, regressing };
}

function buildNextSessionSuggestion(points, exName, equipment) {
  if (!points.length) return null;
  const last = points[points.length-1];
  const { weight: w, reps: r, sets } = last;
  if (!w) return null;

  const isCompound = COMPOUND_PRESS.includes(exName);
  const isDB = !equipment || equipment === 'Dumbbell';
  const nextStep = isDB ? nextDBStep(w) : null;
  const stepGap = nextStep ? nextStep - w : null;
  const isBigJump = stepGap && stepGap > 6;

  // Get rep range from exercise (assume 6-12 as default)
  const repMax = 12;

  let suggestion = '';
  let subtext = '';

  if (r >= repMax) {
    // Hit top of rep range — step up weight
    if (isDB && nextStep) {
      if (isBigJump && isCompound) {
        suggestion = `Try ${nextStep}kg × ${Math.max(4, r-3)}-${r-1} reps`;
        subtext = `Big jump from ${w}kg (+${stepGap}kg) — start with fewer reps`;
      } else if (isBigJump) {
        suggestion = `Try ${nextStep}kg × ${Math.max(5, r-2)} reps`;
        subtext = `Step up from ${w}kg — ${stepGap}kg jump, take it steady`;
      } else {
        suggestion = `Step up to ${nextStep}kg × ${Math.max(6, r-2)}-${r} reps`;
        subtext = `You've hit the top of your rep range at ${w}kg`;
      }
    } else {
      suggestion = `Add 1-2kg: try ${w+2}kg × ${Math.max(6, r-2)} reps`;
      subtext = `Top of rep range — time to increase weight`;
    }
  } else if (r >= repMax - 2) {
    // Close to top — add a rep first
    suggestion = `Same weight ${w}kg — aim for ${r+1}-${r+2} reps`;
    subtext = `One more rep before stepping up to ${nextStep ? nextStep+'kg' : 'heavier weight'}`;
  } else if (r < 6) {
    // Low reps — add reps not weight
    suggestion = `Keep ${w}kg — build to ${r+2} reps per set`;
    subtext = `Focus on reps before adding weight`;
  } else {
    // Mid rep range — add a rep
    suggestion = `Keep ${w}kg — try for ${r+1} reps`;
    subtext = `Progress: add 1 rep this session`;
  }

  // Plateau advice
  const prog = assessProgression(points);
  if (prog.status === 'plateau' && points.length >= 3) {
    suggestion = `Try ${w}kg for ${Math.min(r+2, repMax)} reps (plateau — push reps)`;
    subtext = `Stuck at ${w}kg for ${points.slice(-3).length} sessions — focus on rep quality`;
  }
  if (prog.status === 'regressing') {
    const safeW = prevDBStep(w) || w;
    suggestion = `Drop to ${safeW}kg × ${Math.min(r+3, repMax)} reps`;
    subtext = `Weight trending down — consolidate at ${safeW}kg before stepping back up`;
  }

  return { suggestion, subtext };
}

    kpiRow.appendChild(c);
  });
  container.appendChild(kpiRow);

  // ── Status badge ─────────────────────────────────────────────────────────
  const badge = document.createElement('div');

  badge.innerHTML = `${st.icon} ${st.label}`;
  if (prog.trendPerMonth !== 0 && prog.status !== 'insufficient') {

  // ── Weight sparkline ─────────────────────────────────────────────────────

  setTimeout(() => {

    if (rmCanvas.offsetWidth) {

    }
  }, 100);
}

function drawProgressLine(canvas, labels, data, color, showAnnotations) {
  const dpr = devicePixelRatio||1;
  canvas.width  = canvas.offsetWidth  * dpr;
  canvas.height = canvas.offsetHeight * dpr;
  const ctx = canvas.getContext('2d'); ctx.scale(dpr,dpr);
  const w=canvas.offsetWidth, h=canvas.offsetHeight;
  const pad={top:12,right:12,bottom:22,left:38};
  const cW=w-pad.left-pad.right, cH=h-pad.top-pad.bottom;
  const n=data.length;
  const maxV=Math.max(...data)*1.05, minV=Math.min(...data)*0.95;
  const xS=i=>pad.left+(n===1?cW/2:i/(n-1)*cW);
  const yS=v=>pad.top+cH-((v-minV)/(maxV-minV||1))*cH;

  // Trend line
  const slope = linearTrend(data);
  if (n >= 3) {
    const y0=yS(data[0]+(0)*slope), y1=yS(data[0]+(n-1)*slope);
    ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=1.5; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(xS(0),y0); ctx.lineTo(xS(n-1),y1); ctx.stroke();
    ctx.setLineDash([]);
  }

  // Grid
  [0,0.5,1].forEach(t=>{
    const y=pad.top+t*cH;
    ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(w-pad.right,y); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.35)'; ctx.font=`9px sans-serif`; ctx.textAlign='right';
    ctx.fillText(Math.round(maxV-t*(maxV-minV)), pad.left-4, y+3);
  });

  // Gradient fill
  const grad=ctx.createLinearGradient(0,pad.top,0,pad.top+cH);
  grad.addColorStop(0,color+'40'); grad.addColorStop(1,color+'00');
  ctx.fillStyle=grad;
  ctx.beginPath();
  data.forEach((v,i)=>i===0?ctx.moveTo(xS(i),yS(v)):ctx.lineTo(xS(i),yS(v)));
  ctx.lineTo(xS(n-1),pad.top+cH); ctx.lineTo(xS(0),pad.top+cH); ctx.closePath(); ctx.fill();

  // Line
  ctx.strokeStyle=color; ctx.lineWidth=2.5; ctx.lineJoin='round'; ctx.lineCap='round';
  ctx.beginPath();
  data.forEach((v,i)=>i===0?ctx.moveTo(xS(i),yS(v)):ctx.lineTo(xS(i),yS(v)));
  ctx.stroke();

  // Dots
  data.forEach((v,i)=>{
    ctx.fillStyle=color; ctx.beginPath(); ctx.arc(xS(i),yS(v),3.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.beginPath(); ctx.arc(xS(i),yS(v),1.5,0,Math.PI*2); ctx.fill();
  });

  // X labels
  ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.textAlign='center'; ctx.font='8px sans-serif';
  const step=Math.max(1,Math.ceil(n/5));
  data.forEach((_,i)=>{ if(i%step===0||i===n-1) ctx.fillText(labels[i],xS(i),h-4); });
}

let volumeChartInstance = null;
let exerciseChartInstance = null;

let _statsFrom = null, _statsTo = null;

function initStatsPage() {
  // Build preset buttons
